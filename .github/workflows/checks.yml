name: Checks

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_$(grep '^xcode ' .tool-versions | awk '{print $2}').app"

      - name: Read tool versions
        run: |
          echo "SWIFTFORMAT_VERSION=$(grep '^swiftformat ' .tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"
          echo "SWIFTLINT_VERSION=$(grep '^swiftlint ' .tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"

      - name: Install SwiftFormat
        run: |
          set -euo pipefail
          curl -sL "https://github.com/nicklockwood/SwiftFormat/archive/refs/tags/$SWIFTFORMAT_VERSION.tar.gz" -o /tmp/swiftformat.tar.gz
          mkdir -p /tmp/swiftformat-src
          tar -xzf /tmp/swiftformat.tar.gz -C /tmp/swiftformat-src --strip-components 1
          swift build -c release --package-path /tmp/swiftformat-src
          SWIFTFORMAT_BIN="$(swift build -c release --package-path /tmp/swiftformat-src --show-bin-path)/swiftformat"
          sudo install -m 755 "$SWIFTFORMAT_BIN" /usr/local/bin/swiftformat
          ACTUAL_SWIFTFORMAT_VERSION="$(swiftformat --version)"
          echo "$ACTUAL_SWIFTFORMAT_VERSION"
          if [ "$ACTUAL_SWIFTFORMAT_VERSION" != "$SWIFTFORMAT_VERSION" ] && [ "$SWIFTFORMAT_VERSION:$ACTUAL_SWIFTFORMAT_VERSION" != "0.61.1:0.61.0" ]; then
            echo "swiftformat version mismatch: installed $ACTUAL_SWIFTFORMAT_VERSION, expected $SWIFTFORMAT_VERSION"
            exit 1
          fi

      - name: Install SwiftLint
        run: |
          set -euo pipefail
          curl -sL "https://github.com/realm/SwiftLint/releases/download/$SWIFTLINT_VERSION/portable_swiftlint.zip" -o /tmp/swiftlint.zip
          unzip -o /tmp/swiftlint.zip -d /tmp/swiftlint
          sudo install -m 755 /tmp/swiftlint/swiftlint /usr/local/bin/swiftlint
          ACTUAL_SWIFTLINT_VERSION="$(swiftlint version)"
          echo "$ACTUAL_SWIFTLINT_VERSION"
          if [ "$ACTUAL_SWIFTLINT_VERSION" != "$SWIFTLINT_VERSION" ]; then
            echo "swiftlint version mismatch: installed $ACTUAL_SWIFTLINT_VERSION, expected $SWIFTLINT_VERSION"
            exit 1
          fi

      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run checks
        run: scripts/checks.sh
        env:
          ROOST_SKIP_TOOL_VERSION_CHECKS: "1"
