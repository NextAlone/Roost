name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (format: X.Y.Z)"
        required: true
        default: "1.1.0"
        type: string
      build_number:
        description: "Build number (defaults to GitHub run number)"
        required: false
        type: string
      draft:
        description: "Create a draft release"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release inputs
    runs-on: macos-26
    outputs:
      version: ${{ steps.validate.outputs.version }}
      build_number: ${{ steps.validate.outputs.build_number }}
    steps:
      - name: Validate inputs
        id: validate
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          BUILD_NUMBER="${{ inputs.build_number }}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be in X.Y.Z format"
            exit 1
          fi

          if [[ -z "$BUILD_NUMBER" ]]; then
            BUILD_NUMBER="${{ github.run_number }}"
          fi

          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Error: build number must be numeric"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

  build:
    name: Build arm64 ZIP and release metadata
    needs: validate
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: write
    outputs:
      release_commit: ${{ steps.metadata.outputs.release_commit }}
      zip_name: ${{ steps.hashes.outputs.zip_name }}
      sha256: ${{ steps.hashes.outputs.sha256 }}
      nix_hash: ${{ steps.hashes.outputs.nix_hash }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Require branch run
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" != "branch" ]]; then
            echo "Error: run this workflow from a branch, usually main"
            exit 1
          fi

      - name: Refuse duplicate release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.validate.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Error: tag $TAG already exists"
            exit 1
          fi
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Error: release $TAG already exists"
            exit 1
          fi

      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Build self-signed ZIP
        run: |
          set -euo pipefail
          scripts/build-release.sh \
            --arch arm64 \
            --version "${{ needs.validate.outputs.version }}" \
            --build-number "${{ needs.validate.outputs.build_number }}" \
            --zip \
            --sign-identity -

      - name: Verify bundle version
        run: |
          set -euo pipefail
          SHORT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" build/Roost.app/Contents/Info.plist)
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" build/Roost.app/Contents/Info.plist)
          test "$SHORT_VERSION" = "${{ needs.validate.outputs.version }}"
          test "$BUILD_NUMBER" = "${{ needs.validate.outputs.build_number }}"

      - name: Verify signature
        run: codesign --verify --deep --strict build/Roost.app

      - name: Verify checksum
        run: |
          set -euo pipefail
          cd build
          shasum -a 256 -c SHA256SUMS.txt

      - name: Compute release hashes
        id: hashes
        run: |
          set -euo pipefail
          ZIP_NAME="Roost-${{ needs.validate.outputs.version }}-arm64.zip"
          ZIP_PATH="build/$ZIP_NAME"
          SHA256="$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')"
          NIX_HASH="sha256-$(openssl dgst -sha256 -binary "$ZIP_PATH" | openssl base64 -A)"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "nix_hash=$NIX_HASH" >> "$GITHUB_OUTPUT"

      - name: Update release metadata
        id: metadata
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate.outputs.version }}"
          NIX_HASH="${{ steps.hashes.outputs.nix_hash }}"
          scripts/update-release-metadata.sh "$VERSION" "$NIX_HASH"
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              Muxy/Info.plist \
              RoostHostdXPCService/Info.plist \
              nix/package.nix \
              docs/nix-darwin.md \
              docs/release-distribution.md \
              RELEASE-CHECKLIST.md
            git commit -m "chore(release): prepare v$VERSION"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
          echo "release_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: roost-${{ needs.validate.outputs.version }}-arm64
          path: |
            build/Roost-${{ needs.validate.outputs.version }}-arm64.zip

  release:
    name: Create GitHub release
    needs: [validate, build]
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -name "Roost-${{ needs.validate.outputs.version }}-*.zip" -exec cp {} release-assets/ \;
          cd release-assets
          shasum -a 256 Roost-${{ needs.validate.outputs.version }}-*.zip > SHA256SUMS.txt
          cat > notes.md <<EOF
          Roost ${{ needs.validate.outputs.version }}

          This is the current self-signed/ad-hoc ZIP release. It is not Developer ID signed or notarized.

          Commit: ${{ needs.build.outputs.release_commit }}
          SHA256: ${{ needs.build.outputs.sha256 }}
          Nix hash: ${{ needs.build.outputs.nix_hash }}

          Verify the downloaded archive with SHA256SUMS.txt before opening it.
          EOF
          ls -lh

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.validate.outputs.version }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Error: release $TAG already exists"
            exit 1
          fi
          RELEASE_FLAGS=()
          if [[ "${{ inputs.draft }}" == "true" ]]; then
            RELEASE_FLAGS+=(--draft)
          else
            RELEASE_FLAGS+=(--latest)
          fi
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Roost $TAG" \
            --target "${{ needs.build.outputs.release_commit }}" \
            --notes-file release-assets/notes.md \
            "${RELEASE_FLAGS[@]}" \
            release-assets/Roost-${{ needs.validate.outputs.version }}-*.zip \
            release-assets/SHA256SUMS.txt
