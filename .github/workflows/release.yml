name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (format: X.Y.Z)"
        required: true
        default: "1.0.0"
        type: string
      build_number:
        description: "Build number (defaults to GitHub run number)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release inputs
    runs-on: macos-26
    outputs:
      version: ${{ steps.validate.outputs.version }}
      build_number: ${{ steps.validate.outputs.build_number }}
    steps:
      - name: Validate inputs
        id: validate
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          BUILD_NUMBER="${{ inputs.build_number }}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be in X.Y.Z format"
            exit 1
          fi

          if [[ -z "$BUILD_NUMBER" ]]; then
            BUILD_NUMBER="${{ github.run_number }}"
          fi

          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Error: build number must be numeric"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

  build:
    name: Build arm64 ZIP
    needs: validate
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Build self-signed ZIP
        run: |
          set -euo pipefail
          scripts/build-release.sh \
            --arch arm64 \
            --version "${{ needs.validate.outputs.version }}" \
            --build-number "${{ needs.validate.outputs.build_number }}" \
            --zip \
            --sign-identity -

      - name: Verify bundle version
        run: |
          set -euo pipefail
          SHORT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" build/Roost.app/Contents/Info.plist)
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" build/Roost.app/Contents/Info.plist)
          test "$SHORT_VERSION" = "${{ needs.validate.outputs.version }}"
          test "$BUILD_NUMBER" = "${{ needs.validate.outputs.build_number }}"

      - name: Verify signature
        run: codesign --verify --deep --strict build/Roost.app

      - name: Verify checksum
        run: |
          set -euo pipefail
          cd build
          shasum -a 256 -c SHA256SUMS.txt

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: roost-${{ needs.validate.outputs.version }}-arm64
          path: |
            build/Roost-${{ needs.validate.outputs.version }}-arm64.zip

  release:
    name: Create draft GitHub release
    needs: [validate, build]
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -name "Roost-${{ needs.validate.outputs.version }}-*.zip" -exec cp {} release-assets/ \;
          cd release-assets
          shasum -a 256 Roost-${{ needs.validate.outputs.version }}-*.zip > SHA256SUMS.txt
          cat > notes.md <<EOF
          Roost ${{ needs.validate.outputs.version }}

          This is the current self-signed/ad-hoc ZIP release. It is not Developer ID signed or notarized.

          Verify the downloaded archive with SHA256SUMS.txt before opening it.
          EOF
          ls -lh

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.validate.outputs.version }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Error: release $TAG already exists"
            exit 1
          fi
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Roost $TAG" \
            --draft \
            --notes-file release-assets/notes.md \
            release-assets/Roost-${{ needs.validate.outputs.version }}-*.zip \
            release-assets/SHA256SUMS.txt
