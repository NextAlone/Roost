name: Roost
options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: sh.roost.app
    CLANG_CXX_LIBRARY: "libc++"
    # libghostty.a pulls in C++ STL, Carbon (TIS APIs), Metal / QuartzCore /
    # IOSurface / UniformTypeIdentifiers. Must stay in sync with
    # manaflow-ai/cmux's link line.
    OTHER_LDFLAGS:
      - "-lc++"
      - "-lroost_bridge"
      - "-framework"
      - "Metal"
      - "-framework"
      - "QuartzCore"
      - "-framework"
      - "IOSurface"
      - "-framework"
      - "UniformTypeIdentifiers"
      - "-framework"
      - "Carbon"
    HEADER_SEARCH_PATHS:
      - "$(SRCROOT)/Generated"
    LIBRARY_SEARCH_PATHS:
      - "$(SRCROOT)/Generated"
    SWIFT_OBJC_BRIDGING_HEADER: Generated/RoostBridge-Bridging.h

targets:
  Roost:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Generated/RoostBridge.swift
      - path: Generated/SwiftBridgeCore.swift
      - path: Assets.xcassets
      - path: Generated/roost-hostd
        buildPhase: resources
      - path: Generated/roost-attach
        buildPhase: resources
      - path: Resources
        buildPhase: resources
        type: folder
    dependencies:
      - framework: ../../vendor/GhosttyKit.xcframework
        embed: false
        link: true
    info:
      path: Info.plist
      properties:
        CFBundleName: Roost
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    preBuildScripts:
      - script: |
          set -e
          "$SRCROOT/scripts/build-rust.sh"
        name: Build roost-bridge (Rust)
        inputFiles:
          - $(SRCROOT)/../../crates/roost-bridge/src/lib.rs
          - $(SRCROOT)/../../crates/roost-bridge/Cargo.toml
          - $(SRCROOT)/../../crates/roost-core/src/lib.rs
          - $(SRCROOT)/../../crates/roost-core/src/jj.rs
          - $(SRCROOT)/../../crates/roost-core/src/dto.rs
          - $(SRCROOT)/../../crates/roost-core/src/rpc.rs
          - $(SRCROOT)/../../crates/roost-core/src/paths.rs
          - $(SRCROOT)/../../crates/roost-core/src/session.rs
          - $(SRCROOT)/../../crates/roost-client/src/lib.rs
          - $(SRCROOT)/../../crates/roost-client/src/transport.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/main.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/rpc_server.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/manifest.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/state.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/store.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/events.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/session/mod.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/session/registry.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/session/ring.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/session/spawn.rs
          - $(SRCROOT)/../../crates/roost-hostd/src/session/osc.rs
          - $(SRCROOT)/../../crates/roost-attach/src/main.rs
          - $(SRCROOT)/../../crates/roost-attach/Cargo.toml
          - $(SRCROOT)/../../Cargo.toml
        outputFiles:
          - $(SRCROOT)/Generated/libroost_bridge.a
          - $(SRCROOT)/Generated/roost-hostd
          - $(SRCROOT)/Generated/roost-attach
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: sh.roost.app
