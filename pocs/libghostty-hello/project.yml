name: LibghosttyHello
options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: sh.roost.libghostty-hello

targets:
  LibghosttyHello:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - framework: ../../vendor/GhosttyKit.xcframework
        embed: true
    info:
      path: Info.plist
      properties:
        CFBundleName: LibghosttyHello
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: sh.roost.libghostty-hello
