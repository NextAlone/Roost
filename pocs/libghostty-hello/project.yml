name: LibghosttyHello
options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: sh.roost.libghostty-hello
    CLANG_CXX_LIBRARY: "libc++"
    # GhosttyKit.xcframework ships a static libghostty.a that pulls in C++ STL,
    # Carbon (TIS APIs), Metal / QuartzCore / IOSurface / UniformTypeIdentifiers.
    # Mirror manaflow-ai/cmux's link line verbatim.
    OTHER_LDFLAGS:
      - "-lc++"
      - "-framework"
      - "Metal"
      - "-framework"
      - "QuartzCore"
      - "-framework"
      - "IOSurface"
      - "-framework"
      - "UniformTypeIdentifiers"
      - "-framework"
      - "Carbon"

targets:
  LibghosttyHello:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      # GhosttyKit is a static archive packaged as xcframework. Do NOT embed:
      # embedding forces codesign on libghostty.a as if it were a framework,
      # which fails.
      - framework: ../../vendor/GhosttyKit.xcframework
        embed: false
        link: true
    info:
      path: Info.plist
      properties:
        CFBundleName: LibghosttyHello
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: sh.roost.libghostty-hello
